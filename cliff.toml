[changelog]
header = """# Changelog

All notable changes to this project are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first | trim_end_matches(pat=".") }}.
{%- endfor %}
{% endfor -%}
{% if version and previous.version %}
[{{ version | trim_start_matches(pat="v") }}]: https://github.com/zhoukezi/codecpod/compare/{{ previous.version }}...{{ version }}
{% elif version %}
[{{ version | trim_start_matches(pat="v") }}]: https://github.com/zhoukezi/codecpod/releases/tag/{{ version }}
{% endif %}"""
trim = false

[git]
conventional_commits = true
filter_unconventional = true
tag_pattern = "v[0-9]*"
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Added" },
  { message = "^fix", group = "<!-- 3 -->Fixed" },
  { message = "^doc", group = "<!-- 1 -->Changed" },
  { message = "^perf", group = "<!-- 1 -->Changed" },
  { message = "^refactor", group = "<!-- 1 -->Changed" },
  { message = "^dep", group = "<!-- 1 -->Changed" },
  { message = "^build", group = "<!-- 1 -->Changed" },
  { message = "^revert", group = "<!-- 2 -->Removed" },
  { message = ".*", skip = true },
]
