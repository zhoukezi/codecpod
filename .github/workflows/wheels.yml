name: Build wheels

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
            sdist: true
          - name: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            deployment_target: "11.0"
          - name: macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            deployment_target: "10.13"

    steps:
      - uses: actions/checkout@v6

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: |
          command -v nasm >/dev/null || brew install nasm
          command -v pkg-config >/dev/null || brew install pkg-config

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ runner.os == 'Linux' && matrix.manylinux || '' }}
          args: --release ${{ matrix.sdist && '--sdist' || '' }} --out dist -i python3.9 python3.14t
          before-script-linux: |
            dnf install -y nasm clang clang-libs
            export LIBCLANG_PATH="$(dirname "$(find /usr/lib64 -name 'libclang.so*' | head -1)")"

      - name: Set up Python for testing
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run test suite
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy
          pip install --no-index --find-links dist codecpod
          pytest tests/ -q

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.name }}
          path: dist/*

  build-windows:
    name: Build (windows-x86_64)
    runs-on: windows-latest
    defaults:
      run:
        shell: "msys2 {0}"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python for testing
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnullvm

      - name: Set up MSYS2 (UCRT64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-libunwind
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-nasm
            make autoconf automake libtool diffutils

      - name: Build wheel
        run: |
          export PATH="$(cygpath "$USERPROFILE")/.cargo/bin:$PATH"
          export CARGO_TARGET_X86_64_PC_WINDOWS_GNULLVM_LINKER=clang
          python -m pip install --upgrade pip maturin delvewheel
          maturin build --release --target x86_64-pc-windows-gnullvm -i python --out dist-raw -v
          delvewheel repair dist-raw/*.whl -w dist --add-path "$(cygpath -w /ucrt64/bin)"

      - name: Run test suite
        run: |
          python -m pip install pytest numpy
          python -m pip install --no-index --find-links dist codecpod
          pytest tests/ -q

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-x86_64
          path: dist/*

  publish-pypi:
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Verify version matches tag
        run: |
          version=$(grep -m1 '^version = ' python/Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "python/Cargo.toml version (v${version}) does not match tag (${GITHUB_REF_NAME})" >&2
            exit 1
          fi

      - name: Download wheels artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
